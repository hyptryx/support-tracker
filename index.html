<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>HRX Support Tracker</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .save-btn {
            background: #ff8800;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 20px 0;
        }
        .save-btn:hover {
            background: #ff9900;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">HRX</div>
    <div class="title">
        <h1>Support Tracker</h1>
        <p>Wer supportet wen – übersichtlich, fair, transparent.</p>
    </div>
</header>

<button onclick="saveToGitHub()" class="save-btn">Speichern</button>

<nav>
    <button class="tab-button active" data-tab="tracker">Tracker</button>
    <button class="tab-button" data-tab="ranking">Ranking</button>
    <button class="tab-button" data-tab="export">Export</button>
</nav>

<main>

    <section id="tracker" class="tab active">
        <div id="config">
            <h2>Streamer hinzufügen</h2>
            <input id="newStreamer" placeholder="Name eingeben">
            <button onclick="addStreamer()">Hinzufügen</button>
        </div>

        <h2>Support Matrix</h2>
        <div class="table-wrapper">
            <table id="supportTable"></table>
        </div>
    </section>

    <section id="ranking" class="tab">
        <h2>Monats‑Ranking</h2>
        <p>Wer hat am meisten andere unterstützt?</p>

        <div id="rankingList"></div>

        <h3>Diagramm</h3>
        <div id="chart"></div>
    </section>

</main>

<footer>
    <small>HRX Creator Network – internal tool</small>
</footer>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<!-- Deine Firebase Config -->
<script src="config.js"></script>

<!-- Hauptscript -->
<script src="script.js"></script>

</body>
</html>
