<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>HRX Support Tracker</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .save-btn {
            background: #ff8800;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 20px 0;
        }
        .save-btn:hover {
            background: #ff9900;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
    <img src="logo.PNG" alt="Logo">
</div>
    <div class="title">
        <h1>Support Tracker</h1>
        <p>Wer supportet wen – übersichtlich, fair, transparent.</p>
    </div>
</header>

<button onclick="saveToGitHub()" class="save-btn">Speichern</button>
<button onclick="downloadBackup()" class="save-btn">Backup als JSON</button>
<button onclick="downloadCSV()" class="save-btn">Export als CSV</button>
<button onclick="importData()" class="save-btn">Importieren</button>
  
<nav>
    <button class="tab-button active" data-tab="tracker">Tracker</button>
    <button class="tab-button" data-tab="ranking">Ranking</button>
</nav>

<main>

    <section id="tracker" class="tab active">
        <div id="config">
            <h2>Streamer hinzufügen</h2>
            <input id="newStreamer" placeholder="Name eingeben">
            <button onclick="addStreamer()">Hinzufügen</button>
        </div>

        <div id="quickInput" style="margin: 20px 0;">
            <h2>Schnell‑Support</h2>
            <select id="fromSelect"></select>
            <span style="margin: 0 10px;">→</span>
            <select id="toSelect"></select>
            <button onclick="quickAdd()">+</button>
        </div>
        
        <h2>Support Matrix</h2>
        <div class="table-wrapper">
            <table id="supportTable"></table>
        </div>
    </section>

    <section id="ranking" class="tab">
        <h2>Lifetime‑Ranking</h2>
        <p>Wer hat am meisten andere unterstützt?</p>

        <!-- TOP 3 HERO SECTION -->
<div id="top3"></div>

<!-- FILTER BUTTONS -->
<div id="rankingFilters">
    <button data-limit="10">Top 10</button>
    <button data-limit="20">Top 20</button>
    <button data-limit="9999" class="active">Alle</button>
    <button data-zero="true">0 Supports</button>
</div>

<!-- RESTLICHES RANKING -->
<div id="rankingList"></div>

        <h3>Diagramm</h3>
        <div id="chart"></div>
    </section>

</main>

<footer>
    <small>HRX Creator Network – internal tool - powered by HyptryX der geilen Nudl</small>
</footer>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<!-- Deine Firebase Config -->
<script src="config.js"></script>

<!-- Hauptscript -->
<script src="script.js"></script>

</body>
</html>
